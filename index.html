<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <title>Image360 Viewer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="viewerView" class="view viewer-view view-active" aria-label="360度メディアビューア">
        <div id="panorama" class="panorama" role="img" aria-label="360度メディア"></div>
        <div id="youtubeFrame" class="youtube-frame hidden" aria-label="YouTube 360度動画"></div>
        <div id="youtubeActions" class="youtube-actions hidden" aria-label="YouTube動画操作">
          <button id="youtubeFullscreenButton" class="youtube-action-button" type="button">
            全画面
          </button>
          <a id="youtubeOpenLink" class="youtube-action-button" href="#" target="_blank" rel="noopener">
            YouTubeで開く
          </a>
        </div>

        <div class="viewer-hud">
          <div id="videoControls" class="video-controls hidden" aria-label="動画操作">
            <button id="videoPlayButton" class="video-control-button" type="button" aria-label="再生">
              <span aria-hidden="true">▶</span>
            </button>
            <div class="video-timeline">
              <input id="videoSeekBar" class="video-seek" type="range" min="0" max="1000" value="0" step="1" aria-label="再生位置">
              <div class="video-time">
                <span id="videoCurrentTime">0:00</span>
                <span id="videoDuration">0:00</span>
              </div>
            </div>
            <button id="videoMuteButton" class="video-control-button" type="button" aria-label="ミュート解除">
              <span aria-hidden="true">🔇</span>
            </button>
          </div>

          <p id="viewerMessage" class="viewer-message">スマホを動かすか、画面をドラッグして視点を動かせます。</p>

          <div class="viewer-hud-actions">
            <button id="motionButton" class="motion-button" type="button">
              ジャイロON
            </button>
          </div>
        </div>
      </section>
    </main>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
