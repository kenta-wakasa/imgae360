<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <meta name="robots" content="noindex, nofollow">
    <title>Image360 管理</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="./admin.css">
  </head>
  <body>
    <main class="app-shell">
      <section id="authView" class="view admin-view view-active" aria-labelledby="authTitle">
        <div class="topbar">
          <div>
            <p class="eyebrow">Image360 Admin</p>
            <h1 id="authTitle">ログイン</h1>
          </div>
        </div>

        <form id="loginForm" class="admin-card">
          <h2 class="admin-heading">管理者ログイン</h2>
          <p class="admin-note">アップロード・編集・削除には管理者アカウントでのログインが必要です。</p>
          <label class="field-label" for="loginEmail">メールアドレス</label>
          <input id="loginEmail" class="text-input" type="email" required autocomplete="username" placeholder="admin@example.com">
          <label class="field-label" for="loginPassword">パスワード</label>
          <input id="loginPassword" class="text-input" type="password" required autocomplete="current-password">
          <button id="loginButton" class="primary-button" type="submit">ログイン</button>
          <p id="loginMessage" class="admin-message"></p>
        </form>
      </section>

      <section id="listView" class="view admin-view" aria-labelledby="listTitle">
        <div class="topbar">
          <div>
            <p class="eyebrow">Image360 Admin</p>
            <h1 id="listTitle">360度メディア管理</h1>
          </div>
          <button id="logoutButton" class="secondary-button small-button" type="button">ログアウト</button>
        </div>
        <p id="signedInAs" class="admin-message signed-in-as"></p>

        <form id="uploadForm" class="admin-card">
          <h2 class="admin-heading">新規アップロード</h2>
          <label class="field-label" for="uploadTitle">タイトル</label>
          <input id="uploadTitle" class="text-input" type="text" required maxlength="100" placeholder="例: 海の360度動画">
          <label class="field-label" for="uploadFile">ファイル(360度画像 / 動画)</label>
          <input id="uploadFile" class="file-input" type="file" required
            accept="image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime">
          <button id="uploadButton" class="primary-button" type="submit">アップロード</button>
          <div id="uploadProgress" class="upload-progress hidden" role="progressbar" aria-label="アップロード進捗">
            <div id="uploadProgressBar" class="upload-progress-bar"></div>
          </div>
          <p id="uploadMessage" class="admin-message"></p>
        </form>

        <div class="admin-card">
          <div class="list-header">
            <h2 class="admin-heading">アップロード済みメディア</h2>
            <button id="reloadButton" class="secondary-button small-button" type="button">再読み込み</button>
          </div>
          <p id="listMessage" class="admin-message">読み込んでいます...</p>
          <ul id="mediaList" class="media-list"></ul>
        </div>
      </section>

      <section id="detailView" class="view admin-view" aria-labelledby="detailTitle">
        <div class="topbar detail-topbar">
          <button id="backToListButton" class="icon-button" type="button" aria-label="一覧へ戻る">
            <span aria-hidden="true">←</span>
          </button>
          <div class="detail-heading">
            <p class="eyebrow">Detail</p>
            <h1 id="detailTitle" class="detail-title">タイトル</h1>
          </div>
        </div>

        <div id="detailPreview" class="admin-card detail-preview"></div>

        <dl id="detailMeta" class="admin-card detail-meta"></dl>

        <form id="titleForm" class="admin-card">
          <h2 class="admin-heading">メタ情報の編集</h2>
          <label class="field-label" for="titleInput">タイトル</label>
          <input id="titleInput" class="text-input" type="text" required maxlength="100">
          <button class="secondary-button" type="submit">タイトルを保存</button>
        </form>

        <div class="admin-card">
          <h2 class="admin-heading">ビューアURL(QRコードの内容)</h2>
          <code id="viewerUrl" class="url-box"></code>
          <div class="button-row">
            <button id="copyUrlButton" class="secondary-button" type="button">URLをコピー</button>
            <a id="openViewerLink" class="secondary-button link-button" href="#" target="_blank" rel="noopener">ビューアで開く</a>
          </div>
        </div>

        <div class="admin-card qr-card">
          <h2 class="admin-heading">QRコード</h2>
          <canvas id="qrCodeCanvas" class="qr-canvas"></canvas>
          <button id="downloadQrButton" class="secondary-button" type="button">QR画像をダウンロード</button>
        </div>

        <div class="admin-card danger-card">
          <h2 class="admin-heading">削除</h2>
          <p class="admin-note">削除するとQRコードからも再生できなくなります。この操作は取り消せません。</p>
          <button id="deleteButton" class="danger-button" type="button">このメディアを削除</button>
        </div>

        <p id="detailMessage" class="admin-message"></p>
      </section>
    </main>

    <script type="module" src="./admin.js"></script>
  </body>
</html>
